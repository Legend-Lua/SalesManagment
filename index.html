<head>
<meta charset="UTF-8">

<title>Kalisch Acero — Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--panel:#F2F2EF;--ink:#1B1B19;--muted:#8C8C86;--green:#2C6B42;--border:#E7E7E1}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.lock{background:var(--panel);border-radius:20px;padding:44px 40px;max-width:400px;width:100%;text-align:center}
.lock img{max-width:96px;margin:0 auto 20px;display:block}
.lock h1{font-size:18px;font-weight:800;color:var(--ink);margin-bottom:6px}
.lock p{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.5}
.lock input{width:100%;border:1px solid var(--border);border-radius:12px;padding:13px 16px;font-family:inherit;font-size:15px;color:var(--ink);background:#fff;outline:none;text-align:center;letter-spacing:.04em}
.lock input:focus{border-color:var(--green)}
.lock button{width:100%;margin-top:12px;border:0;border-radius:12px;padding:13px;background:var(--green);color:#fff;font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;transition:opacity .15s}
.lock button:hover{opacity:.92}
.err{color:#C0392B;font-size:12.5px;margin-top:12px;font-weight:600;min-height:16px}
</style>
</head>

function b2u8(b64){const s=atob(b64);const u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u;}
async function tryDecrypt(pass){
  const raw=b2u8(PAYLOAD);
  const magic=new TextDecoder().decode(raw.slice(0,8));
  if(magic!=="Salted__")throw new Error("formato");
  const salt=raw.slice(8,16), ct=raw.slice(16);
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pass),"PBKDF2",false,["deriveBits"]);
  const bits=await crypto.subtle.deriveBits({name:"PBKDF2",salt:salt,iterations:100000,hash:"SHA-256"},km,48*8);
  const kb=new Uint8Array(bits);
  const key=await crypto.subtle.importKey("raw",kb.slice(0,32),{name:"AES-CBC"},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-CBC",iv:kb.slice(32,48)},key,ct);
  return new TextDecoder().decode(pt);
}
async function unlock(){
  const pass=document.getElementById("pw").value;
  const err=document.getElementById("err");
  err.textContent="";
  if(!pass){err.textContent="Escribe la contraseña.";return;}
  try{
    const html=await tryDecrypt(pass);
    try{sessionStorage.setItem("kp_pw",pass);}catch(e){}
    document.open();document.write(html);document.close();
  }catch(e){err.textContent="Contraseña incorrecta.";}
}
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")unlock();});
(async()=>{try{const p=sessionStorage.getItem("kp_pw");if(p){const html=await tryDecrypt(p);document.open();document.write(html);document.close();}}catch(e){}})();
</script>
